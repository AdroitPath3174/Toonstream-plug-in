name: Build Cloudstream Extension

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Verify Files
        run: |
          echo "ROOT FILES:"
          ls
          echo "TOONSTREAM FILES:"
          ls ToonStream

      - name: Grant Gradle Permission
        run: chmod +x gradlew

      - name: Build Extensions
        run: ./gradlew make

      - name: Show Build Folder
        run: |
          echo "BUILD CONTENT:"
          find build

      - name: Upload CS3 Files
        uses: actions/upload-artifact@v4
        with:
          name: cloudstream-build
          path: |
            build/**/*.cs3
            build/*.cs3
